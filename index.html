<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temp Tracker</title>

    <link rel="stylesheet" href="./estilos.css">
</head>
<body>
    <div class="contenedor">
        <div class="buscador" >
            <input 
                type="text"
                placeholder="Ingresa nombre de ciudad"
                spellcheck="false"
                autocomplete="false"
                id="input-ciudad"
            />
            <button onclick="obtenerClima()">
                <img src="images/buscar.png">
            </button>
        </div>

        <div class="clima-info">
            <p class="clima-texto">Parcialmente nublado</p>
            <img src="images/clima-ejemplo.webp" class="clima-icono"/>
            <h1 class="temp">22°C</h1>
            <h2 class="ciudad">Huancayo</h2>
            <div class="detalles">
                <div class="col">
                    <img src="images/humedad.png">
                    <div>
                        <p class="humedad">50%</p>
                        <p>Humedad</p>
                    </div>
                </div>

                <div class="col">
                    <img src="images/viento.png" >
                    <div>
                        <p class="viento">15 km/h</p>
                        <p>Viento</p>
                    </div>
                </div>
            </div>
            
            <div class="clima-info">

        </div>
        <div class="desarrollado-por">
            Desarrollado por <a href="about.html" >Alexis Paucar</a>
        </div>
    </div>
    <script src="./codigo.js"></script>
</body>
</html>
